<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qualmax AI Insight</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="insight-card">
    <div class="corner"></div>

    <div class="header">
      <div>
        <h1>QUALMAX AI INSIGHT</h1>
        <p>Executive KPI Summary</p>
      </div>
      <div class="status">● LIVE</div>
    </div>

    <div class="score-box">
      <div class="score">90</div>
      <div class="score-label">EXECUTIVE SCORE</div>
      <div class="grade">A GRADE · STABLE</div>
    </div>

    <div class="section">
      <h2>SUMMARY</h2>
      <ul id="summary-list">
        <li>데이터를 불러오는 중입니다.</li>
      </ul>
    </div>

    <div class="section">
      <h2>NEXT ACTION</h2>
      <ul id="action-list">
        <li>업데이트 대기 중입니다.</li>
      </ul>
    </div>

    <div class="footer">
      <span id="last-update">Last Update -</span>
      <strong>QUALMAX KPI SYSTEM</strong>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
